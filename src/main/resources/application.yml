server:
  port: 8080

spring:
  application:
    name: rate-limiter-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

# Tier-based Rate Limiting Configurations per path
app:
  rate-limit:
    configs:
      - path: "/api/v1/data"
        window-ms: 60000
        limits:
          ANONYMOUS: 2
          STANDARD: 10
          PREMIUM: 50
      - path: "/api/v1/profile"
        window-ms: 60000
        limits:
          ANONYMOUS: 1
          STANDARD: 3
          PREMIUM: 15
